name: Docker Publish

on:
  push:
    branches:
      - stage
      - main
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: jordandaudu
  BACKEND_IMAGE: jordandaudu/intelligent-investor-backend
  FRONTEND_IMAGE: jordandaudu/intelligent-investor-frontend

jobs:
  tests:
    name: Run tests before publishing
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: investor_user
          POSTGRES_PASSWORD: investor_password
          POSTGRES_DB: investor_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U investor_user -d investor_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js for backend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://investor_user:investor_password@localhost:5432/investor_db
        run: npm test

      - name: Setup Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  docker-publish:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Docker image tags
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "backend_tags=${BACKEND_IMAGE}:latest,${BACKEND_IMAGE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "frontend_tags=${FRONTEND_IMAGE}:latest,${FRONTEND_IMAGE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_NAME}" = "stage" ]; then
            echo "backend_tags=${BACKEND_IMAGE}:stage,${BACKEND_IMAGE}:stage-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "frontend_tags=${FRONTEND_IMAGE}:stage,${FRONTEND_IMAGE}:stage-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.vars.outputs.backend_tags }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            VITE_API_BASE_URL=http://localhost:8000
          tags: ${{ steps.vars.outputs.frontend_tags }}
