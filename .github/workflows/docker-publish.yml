name: Docker Publish

on:
  workflow_run:
    workflows:
      - CI / CD
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

env:
  BACKEND_IMAGE: jordandaudu/intelligent-investor-backend
  FRONTEND_IMAGE: jordandaudu/intelligent-investor-frontend

jobs:
  docker-publish:
    name: Build and push Docker images
    runs-on: ubuntu-latest

    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Checkout repository at tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set Docker image tags
        id: vars
        run: |
          SHORT_SHA="$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)"

          echo "backend_tags=${BACKEND_IMAGE}:latest,${BACKEND_IMAGE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_tags=${FRONTEND_IMAGE}:latest,${FRONTEND_IMAGE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.vars.outputs.backend_tags }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            VITE_API_BASE_URL=http://localhost:8000
          tags: ${{ steps.vars.outputs.frontend_tags }}