services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-investor_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-investor_password}
      POSTGRES_DB: ${POSTGRES_DB:-investor_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - intelligent_investor_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      # Container always listens on 8000; host port is configurable via BACKEND_PORT.
      BACKEND_PORT: 8000
      BACKEND_HOST: 0.0.0.0
      DATABASE_URL: "postgresql://${POSTGRES_USER:-investor_user}:${POSTGRES_PASSWORD:-investor_password}@postgres:5432/${POSTGRES_DB:-investor_db}"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  intelligent_investor_postgres_data:
    name: intelligent_investor_postgres_data
