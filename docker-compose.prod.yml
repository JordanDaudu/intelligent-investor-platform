# Production-ready Docker Compose example.
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Notes:
#  - All credentials/URLs are sourced from env vars — never hardcoded.
#  - Ports default to standard prod values (80 for frontend, 8000 for backend behind a reverse proxy).
#  - Use a dedicated secret manager / orchestrator (Kubernetes, Swarm, ECS) for real deployments.

services:
  postgres:
    image: postgres:16-alpine
    container_name: iip_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - intelligent_investor_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iip_backend_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      BACKEND_HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: iip_frontend_prod
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

volumes:
  intelligent_investor_postgres_data:
    name: intelligent_investor_postgres_data
