# Production-ready Docker Compose example.
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Notes:
#  - All credentials/URLs are sourced from env vars — never hardcoded.
#  - Ports default to standard prod values (80 for frontend, 8000 for backend behind a reverse proxy).
#  - Use a dedicated secret manager / orchestrator (Kubernetes, Swarm, ECS) for real deployments.

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - intelligent_investor_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Container always listens on 8000; host port is configurable via BACKEND_PORT.
      BACKEND_PORT: 8000
      BACKEND_HOST: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
        healthcheck:
        test:
          [
            "CMD-SHELL",
            "node -e \"fetch('http://127.0.0.1:8000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
          ]
        interval: 30s
        timeout: 5s
        retries: 5
        start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  intelligent_investor_postgres_data:
    name: intelligent_investor_postgres_data
